<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>لوحة المحل | ذوق فروتس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- ===== PIN LOCK ===== -->
<div id="lock" class="lock">
  <div class="lock-card">
    <div class="lock-logo">🔒</div>
    <h1>لوحة صاحب المحل</h1>
    <p>أدخل الرمز للدخول</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off">
    <button class="btn-unlock" onclick="tryUnlock()">دخول</button>
    <p class="lock-hint">الرمز الافتراضي: 1234 — يمكن تغييره من الإعدادات</p>
    <a class="lock-back" href="index.html">← العودة لشاشة الطلب</a>
  </div>
</div>

<!-- ===== BOARD ===== -->
<div id="board" class="board hidden">
  <header class="dash-head">
    <div class="dash-title">
      <span class="dash-logo">🍹</span>
      <div>
        <h1>لوحة الطلبات</h1>
        <span class="dash-sub">ذوق فروتس</span>
      </div>
    </div>
    <div class="dash-metrics">
      <div class="metric"><span class="m-val" id="mOrders">0</span><span class="m-lbl">طلبات اليوم</span></div>
      <div class="metric"><span class="m-val" id="mActive">0</span><span class="m-lbl">قيد العمل</span></div>
      <div class="metric"><span class="m-val" id="mRevenue">0</span><span class="m-lbl">إيرادات اليوم (دج)</span></div>
    </div>
    <div class="dash-tools">
      <span class="mode-badge" id="modeBadge">محلي</span>
      <button class="tool-btn" id="soundBtn" onclick="toggleSound()" title="الصوت">🔔</button>
      <button class="tool-btn" onclick="openDashSettings()" title="إعدادات">⚙️</button>
      <a class="tool-btn" href="index.html" title="شاشة الطلب">🛒</a>
    </div>
  </header>

  <div class="columns">
    <section class="col col-new">
      <div class="col-head"><span class="dot"></span> جديدة <span class="col-cnt" id="cntNew">0</span></div>
      <div class="col-list" id="listNew"></div>
    </section>
    <section class="col col-prep">
      <div class="col-head"><span class="dot"></span> قيد التحضير <span class="col-cnt" id="cntPrep">0</span></div>
      <div class="col-list" id="listPrep"></div>
    </section>
    <section class="col col-ready">
      <div class="col-head"><span class="dot"></span> جاهزة للتسليم <span class="col-cnt" id="cntReady">0</span></div>
      <div class="col-list" id="listReady"></div>
    </section>
  </div>
</div>

<!-- ===== SETTINGS MODAL ===== -->
<div id="dashSettings" class="modal">
  <div class="modal-card">
    <h3>إعدادات اللوحة</h3>
    <div class="field">
      <label>تغيير رمز الدخول</label>
      <input id="pinChange" type="text" inputmode="numeric" placeholder="رمز جديد">
    </div>
    <div class="field">
      <label>إعدادات Firebase (للربط بين الأجهزة)</label>
      <textarea id="fbCfg" rows="6" placeholder='{ "apiKey": "...", "projectId": "...", ... }'></textarea>
      <small id="fbMode">الوضع الحالي: محلي</small>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="clearDone()">مسح المكتملة</button>
      <button class="btn-ghost" onclick="closeDashSettings()">إغلاق</button>
      <button class="btn-save" onclick="saveDashSettings()">حفظ</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="store.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
